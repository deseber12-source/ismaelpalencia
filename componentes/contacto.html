<section id="contacto" class="contacto">
    <div class="container">
        <div class="contacto-info">
            <h2><span>Hablemos</span>Contacto</h2>
            <div class="contacto-info-item">
                <i class="fas fa-map-marker-alt"></i>
                <div>
                    <h4>Ubicación</h4>
                    <p>Coyoacán, Ciudad de México</p>
                </div>
            </div>
            <div class="contacto-info-item">
                <i class="fas fa-phone-alt"></i>
                <div>
                    <h4>Teléfono / WhatsApp</h4>
                    <p><a href="tel:+5215548536808">+52 55 4853 6808</a></p>
                </div>
            </div>
            <div class="contacto-info-item">
                <i class="fas fa-envelope"></i>
                <div>
                    <h4>Email</h4>
                    <p><a href="mailto:eduardo.palencia@cobrabien.org">eduardo.palencia@cobrabien.org</a></p>
                </div>
            </div>
            <div class="contacto-info-item">
                <i class="fas fa-clock"></i>
                <div>
                    <h4>Horario</h4>
                    <p>Lunes a Domingo, respuesta en línea</p>
                </div>
            </div>
        </div>

        <div class="contacto-form">
            <h3>Envíame un mensaje</h3>
            <form id="form-contacto">
                <div class="form-group">
                    <label for="nombre">Nombre *</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono">
                </div>
                <div class="form-group">
                    <label for="mensaje">Mensaje *</label>
                    <textarea id="mensaje" name="mensaje" rows="5" required></textarea>
                </div>

                <input type="hidden" name="cliente_id" value="ismaelpalencia">

                <div class="cf-turnstile" data-sitekey="1x00000000000000000000AA" data-theme="dark"></div>

                <button type="submit" class="btn">Enviar mensaje</button>
            </form>
        </div>
    </div>
</section>
